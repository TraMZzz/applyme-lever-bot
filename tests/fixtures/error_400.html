<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply – Aledade</title>
</head>
<body>
  <div class="section page-centered application-form">
    <p class="error-message">&#10033; There was an error verifying your application. Please try again.</p>
    <form method="POST" action="/aledade/6fd40837-0000-0000-0000-000000000000/apply">
      <div class="field-error">
        <input type="tel" name="phone" required>
        <span class="field-error-text">This field is required.</span>
      </div>
      <input type="text"  name="name"  required>
      <input type="email" name="email" required>
      <button type="submit">Submit application</button>
    </form>
  </div>
</body>
</html>
